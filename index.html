function p2(n){ return ("0"+n).slice(-2); }
function dt(m,d,t){ return "2026"+p2(m)+p2(d)+"T"+t; }

function glink(ev,m,d,hi,hf){
  return "https://calendar.google.com/calendar/render?action=TEMPLATE"
    +"&text="+encodeURIComponent("Plantão Diaconia — "+ev)
    +"&dates="+dt(m,d,hi)+"/"+dt(m,d,hf)
    +"&location="+encodeURIComponent("IP Manancial, Brasília, DF")
    +"&details="+encodeURIComponent("Escala de Diaconia — IP Manancial 2026");
}

function vevent(ev,m,d,hi,hf){
  var s=dt(m,d,hi), f=dt(m,d,hf);
  var uid=s+Math.random().toString(36).slice(2)+"@ipmanancial";
  return "BEGIN:VEVENT\r\nUID:"+uid+"\r\nDTSTART:"+s+"\r\nDTEND:"+f
    +"\r\nSUMMARY:Plantão Diaconia — "+ev
    +"\r\nLOCATION:IP Manancial\\, Brasília\\, DF"
    +"\r\nDESCRIPTION:Escala de Diaconia — IP Manancial 2026"
    +"\r\nEND:VEVENT";
}

function baixarICS(txt, nome){
  var b = new Blob([txt],{type:"text/calendar;charset=utf-8"});
  var u = URL.createObjectURL(b);
  var a = document.createElement("a");
  a.href=u; a.download=nome;
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(u); }, 500);
}

function meusMeus(nome){
  var r=[];
  for(var i=0;i<E.length;i++){
    var mb=E[i].eq.split("/");
    for(var j=0;j<mb.length;j++){
      if(mb[j].trim()===nome){ r.push(E[i]); break; }
    }
  }
  return r;
}

    +'<div class="avatar">'+ini+'</div>'
    +'<div><div class="ph-nome">'+nome+'</div>'
    +'<div class="ph-sub">'+total+' plantão'+(total>1?'s':'')+' no semestre</div></div>'
    +'</div>';

  h+='<div class="resumo">';
  if(cont.ceia)   h+='<span class="pill">🟡 '+cont.ceia+' Ceia</span>';
  if(cont.ebd)    h+='<span class="pill">🔵 '+cont.ebd+' EBD/Culto</span>';
  if(cont.terca)  h+='<span class="pill">🟢 '+cont.terca+' Terça</span>';
  if(cont.sement) h+='<span class="pill">🟣 '+cont.sement+' Sementeira</span>';
  if(cont.outro)  h+='<span class="pill">🟠 '+cont.outro+' Especial</span>';
  h+='</div>';

  h+='<button class="add-btn btn-g" id="btnG">📅 Adicionar todos ao Google Agenda</button>';
  h+='<button class="add-btn btn-a" id="btnA">🍎 Baixar para Apple Calendar</button>';
  h+='<p class="btn-hint">Ou adicione um evento por vez abaixo ↓</p>';

  var porMes={};
  for(var i=0;i<meus.length;i++){
    if(!porMes[meus[i].m]) porMes[meus[i].m]=[];
    porMes[meus[i].m].push(meus[i]);
  }
  var ms=Object.keys(porMes).map(Number).sort(function(a,b){return a-b;});

  for(var mi=0;mi<ms.length;mi++){
    var m=ms[mi];
    h+='<div class="month-title">'+MF[m]+'</div>';
    var evts=porMes[m];
    for(var ei=0;ei<evts.length;ei++){
      var e=evts[ei];
      var gl=glink(e.ev,e.m,e.d,e.hi,e.hf);
      var es=e.ev.replace(/"/g,"&quot;").replace(/'/g,"&#39;");
      h+='<div class="ev-card '+e.tp+'">'
        +'<div class="ev-data"><div class="ev-dia">'+e.d+'</div><div class="ev-mes">'+MA[e.m]+'</div></div>'
        +'<div class="ev-info">'
        +'<div class="ev-nome">'+e.ev+'</div>'
        +'<div class="ev-hr">🕐 '+e.hr+'</div>'
        +'<span class="badge '+e.tp+'">'+TL[e.tp]+'</span>'
        +'</div>'
        +'<div class="cal-col">'
        +'<a class="cal-btn cal-g" href="'+gl+'" target="_blank" rel="noopener">Google</a>'
        +'<button class="cal-btn cal-a" data-ev="'+es+'" data-m="'+e.m+'" data-d="'+e.d+'" data-hi="'+e.hi+'" data-hf="'+e.hf+'">Apple</button>'
        +'</div>'
        +'</div>';
    }
  }

  res.innerHTML=h;

  document.getElementById("btnVoltar").onclick=function(){
    res.style.display="none";
    tel.style.display="block";
    window.scrollTo(0,0);
  };

  document.getElementById("btnG").onclick=function(){
    window.open(glink(meus[0].ev,meus[0].m,meus[0].d,meus[0].hi,meus[0].hf),"_blank");
  };

  document.getElementById("btnA").onclick=function(){
    var vs="";
    for(var i=0;i<meus.length;i++) vs+=vevent(meus[i].ev,meus[i].m,meus[i].d,meus[i].hi,meus[i].hf)+"\r\n";
    baixarICS("BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//IPManancial//PT\r\n"+vs+"END:VCALENDAR",
      "escala_"+nome.replace(/\s+/g,"_")+"_2026.ics");
  };

  var abts=res.querySelectorAll(".cal-a");
  for(var i=0;i<abts.length;i++){
    abts[i].onclick=(function(btn){
      return function(){
        icsUm(btn.getAttribute("data-ev"),
               parseInt(btn.getAttribute("data-m")),
               parseInt(btn.getAttribute("data-d")),
               btn.getAttribute("data-hi"),
               btn.getAttribute("data-hf"));
      };
    })(abts[i]);
  }
}

function icsUm(ev,m,d,hi,hf){
  var txt="BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//IPManancial//PT\r\n"
    +vevent(ev,m,d,hi,hf)+"\r\nEND:VCALENDAR";
  baixarICS(txt,"plantao_"+p2(d)+"_"+p2(m)+".ics");
}

// Montar botões de nome
(function(){
  var g=document.getElementById("nomes");
  for(var i=0;i<PESSOAS.length;i++){
    var nome=PESSOAS[i][0], papel=PESSOAS[i][1];
    var btn=document.createElement("button");
    btn.type="button";
    btn.className="name-btn";
    btn.innerHTML=nome+'<span class="role">'+papel+'</span>';
    btn.onclick=(function(n){ return function(){ mostrar(n); }; })(nome);
    g.appendChild(btn);
  }
})();
</script>
</body>
</html>
