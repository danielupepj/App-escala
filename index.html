<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Escala Diaconia · IP Manancial</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  background: #f0f7f7;
  color: #111;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.header {
  background: linear-gradient(135deg, #165c59 0%, #18a8a3 100%);
  padding: 10px 16px 8px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.header-logo { width: 40px; height: 40px; border-radius: 50%; background: #fff; padding: 2px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.header-logo img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
.header-text .sup { color: rgba(255,255,255,0.7); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; line-height: 1; }
.header-text h1  { color: #fff; font-size: 17px; font-weight: 700; line-height: 1.2; }
.header-text .sub { color: rgba(255,255,255,0.65); font-size: 11px; margin-top: 1px; }

/* INSTRUÇÃO BEM DESTACADA */
.instrucao {
  background: #0e4a47;
  padding: 10px 16px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.instrucao-emoji {
  font-size: 22px;
  animation: pulso 1.4s ease-in-out infinite;
}
@keyframes pulso {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.25); }
}
.instrucao-texto {
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.3px;
  line-height: 1.3;
}
.instrucao-texto span {
  display: block;
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.65);
  margin-top: 1px;
}

.names-wrap { flex: 1; padding: 8px 10px 8px; display: flex; flex-direction: column; }
.names-grid {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: repeat(8, 1fr);
  gap: 6px;
}
.name-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fff;
  border: 2px solid #bcdadb;
  border-radius: 12px;
  font-size: 20px;
  font-weight: 700;
  color: #165c59;
  cursor: pointer;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  -webkit-appearance: none; appearance: none;
  touch-action: manipulation;
  text-align: center;
  padding: 4px 6px;
  line-height: 1.2;
}
.name-btn:active { background: #e4f4f4; border-color: #18a8a3; }

#resultado {
  display: none;
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 14px 12px 40px;
}

.person-header { background: linear-gradient(135deg, #165c59 0%, #18a8a3 100%); border-radius: 16px; padding: 14px 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; box-shadow: 0 3px 12px rgba(22,92,89,0.2); }
.avatar { width: 48px; height: 48px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; color: #165c59; flex-shrink: 0; }
.ph-nome { color: #fff; font-size: 19px; font-weight: 700; }
.ph-sub  { color: rgba(255,255,255,0.7); font-size: 12px; margin-top: 2px; }

.resumo { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 8px; }
.pill { background: #fff; border: 2px solid #bcdadb; border-radius: 30px; padding: 7px 13px; font-size: 14px; font-weight: 600; color: #165c59; cursor: pointer; -webkit-appearance: none; appearance: none; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; touch-action: manipulation; }
.pill.ativo { background: #165c59; border-color: #165c59; color: #fff; }
.filtro-label { font-size: 12px; color: #18a8a3; text-align: center; margin-bottom: 10px; font-style: italic; display: none; }

.add-btn { display: block; width: 100%; border: none; border-radius: 13px; padding: 15px; font-size: 16px; font-weight: 700; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; cursor: pointer; margin-bottom: 8px; -webkit-appearance: none; appearance: none; touch-action: manipulation; text-align: center; }
.btn-g { background: #165c59; color: #fff; }
.btn-a { background: #1c1c1e; color: #fff; }
.btn-hint { font-size: 13px; color: #18a8a3; text-align: center; margin-bottom: 16px; }

.month-title { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: #18a8a3; margin: 16px 0 8px; padding-left: 2px; }

.ev-card { background: #fff; border: 1.5px solid #d4eaea; border-radius: 13px; padding: 13px 12px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 12px; box-shadow: 0 1px 3px rgba(22,92,89,0.06); }
.ev-card.ceia   { border-left: 5px solid #165c59; }
.ev-card.ebd    { border-left: 5px solid #18a8a3; }
.ev-card.terca  { border-left: 5px solid #62c1cd; }
.ev-card.sement { border-left: 5px solid #0e8080; }
.ev-card.outro  { border-left: 5px solid #bcdadb; }
.ev-card.oculto { display: none; }

.ev-data { text-align: center; min-width: 40px; flex-shrink: 0; }
.ev-dia  { font-size: 26px; font-weight: 800; line-height: 1; color: #165c59; }
.ev-mes  { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #18a8a3; margin-top: 1px; }
.ev-info { flex: 1; min-width: 0; }
.ev-nome { font-size: 15px; font-weight: 700; color: #165c59; margin-bottom: 3px; line-height: 1.3; }
.ev-hr   { font-size: 13px; color: #18a8a3; margin-bottom: 6px; font-weight: 500; }
.badge   { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; }
.badge.ceia   { background: #e8f5f5; color: #165c59; }
.badge.ebd    { background: #d4f0ee; color: #18a8a3; }
.badge.terca  { background: #ddf2f4; color: #3a9fa8; }
.badge.sement { background: #d0eded; color: #0e8080; }
.badge.outro  { background: #eaf6f6; color: #62c1cd; }

.cal-col { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
.cal-btn { display: block; font-size: 11px; font-weight: 700; padding: 6px 9px; border-radius: 7px; text-decoration: none; text-align: center; cursor: pointer; border: none; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; -webkit-appearance: none; appearance: none; touch-action: manipulation; white-space: nowrap; }
.cal-g { background: #e8f5f5; color: #165c59; }
.cal-a { background: #f3f4f6; color: #1c1c1e; }

.voltar-btn { display: block; width: 100%; background: #fff; border: 2px solid #bcdadb; border-radius: 13px; padding: 14px; font-size: 16px; font-weight: 700; color: #165c59; text-align: center; cursor: pointer; margin-bottom: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; -webkit-appearance: none; appearance: none; touch-action: manipulation; }
</style>
</head>

function p2(n){return("0"+n).slice(-2);}
function dt(m,d,t){return"2026"+p2(m)+p2(d)+"T"+t;}
function glink(ev,m,d,hi,hf){return"https://calendar.google.com/calendar/render?action=TEMPLATE&text="+encodeURIComponent("Plantão Diaconia — "+ev)+"&dates="+dt(m,d,hi)+"/"+dt(m,d,hf)+"&location="+encodeURIComponent("IP Manancial, Brasília, DF")+"&details="+encodeURIComponent("Escala de Diaconia — IP Manancial 2026");}
function vevent(ev,m,d,hi,hf){var s=dt(m,d,hi),f=dt(m,d,hf),uid=s+Math.random().toString(36).slice(2)+"@ip";return"BEGIN:VEVENT\r\nUID:"+uid+"\r\nDTSTART:"+s+"\r\nDTEND:"+f+"\r\nSUMMARY:Plantão Diaconia — "+ev+"\r\nLOCATION:IP Manancial\, Brasília\, DF\r\nDESCRIPTION:Escala de Diaconia — IP Manancial 2026\r\nEND:VEVENT";}
function baixarICS(txt,nome){var b=new Blob([txt],{type:"text/calendar;charset=utf-8"}),u=URL.createObjectURL(b),a=document.createElement("a");a.href=u;a.download=nome;document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(u);},500);}
function meusMeus(nome){var r=[];for(var i=0;i<E.length;i++){var mb=E[i].eq.split("/");for(var j=0;j<mb.length;j++){if(mb[j].trim()===nome){r.push(E[i]);break;}}}return r;}

var filtroAtivo=null,meusCurrent=[];

function aplicarFiltro(tp){
  filtroAtivo=(filtroAtivo===tp)?null:tp;
  var pills=document.querySelectorAll(".pill");
  for(var i=0;i<pills.length;i++) pills[i].className="pill"+(pills[i].getAttribute("data-tp")===filtroAtivo?" ativo":"");
  var cards=document.querySelectorAll(".ev-card");
  for(var i=0;i<cards.length;i++){var c=cards[i],t=c.getAttribute("data-tp");c.className="ev-card "+t+(filtroAtivo&&t!==filtroAtivo?" oculto":"");}
  var blocos=document.querySelectorAll(".mes-bloco");
  for(var i=0;i<blocos.length;i++){var bcs=blocos[i].querySelectorAll(".ev-card"),vis=false;for(var j=0;j<bcs.length;j++) if(bcs[j].className.indexOf("oculto")===-1) vis=true;blocos[i].style.display=vis?"block":"none";}
  var lbl=document.getElementById("filtroLabel");
  if(filtroAtivo){lbl.style.display="block";lbl.innerHTML="Filtro: <b>"+TL[filtroAtivo]+"</b> — toque novamente para ver tudo";}
  else lbl.style.display="none";
}

function mostrar(nome){
  meusCurrent=meusMeus(nome);filtroAtivo=null;
  var tel=document.getElementById("telaNomes"),res=document.getElementById("resultado");
  tel.style.display="none";res.style.display="block";res.scrollTop=0;
  var cont={ceia:0,ebd:0,terca:0,sement:0,outro:0};
  for(var i=0;i<meusCurrent.length;i++) cont[meusCurrent[i].tp]++;
  var ini=nome.split(" ").map(function(w){return w[0];}).join("").slice(0,2).toUpperCase();
  var h='<button class="voltar-btn" id="btnVoltar">← Voltar à lista</button>';
  h+='<div class="person-header"><div class="avatar">'+ini+'</div><div><div class="ph-nome">'+nome+'</div><div class="ph-sub">'+meusCurrent.length+' plantão'+(meusCurrent.length>1?'s':'')+' · toque nos ícones para filtrar</div></div></div>';
  h+='<div class="resumo">';
  var tipos=["ceia","ebd","terca","sement","outro"];
  for(var ti=0;ti<tipos.length;ti++){var tp=tipos[ti];if(cont[tp])h+='<button class="pill" data-tp="'+tp+'" onclick="aplicarFiltro(\''+tp+'\')">'+EM[tp]+' '+cont[tp]+' '+TL[tp]+'</button>';}
  h+='</div><div class="filtro-label" id="filtroLabel"></div>';
  h+='<button class="add-btn btn-g" id="btnG">📅 Adicionar todos ao Google Agenda</button>';
  h+='<button class="add-btn btn-a" id="btnA">🍎 Baixar para Apple Calendar</button>';
  h+='<p class="btn-hint">Ou adicione evento por evento abaixo ↓</p>';
  var porMes={};
  for(var i=0;i<meusCurrent.length;i++){if(!porMes[meusCurrent[i].m])porMes[meusCurrent[i].m]=[];porMes[meusCurrent[i].m].push(meusCurrent[i]);}
  var ms=Object.keys(porMes).map(Number).sort(function(a,b){return a-b;});
  for(var mi=0;mi<ms.length;mi++){
    var m=ms[mi];h+='<div class="mes-bloco"><div class="month-title">'+MF[m]+'</div>';
    var evts=porMes[m];
    for(var ei=0;ei<evts.length;ei++){var e=evts[ei],gl=glink(e.ev,e.m,e.d,e.hi,e.hf),es=e.ev.replace(/"/g,"&quot;").replace(/'/g,"&#39;");h+='<div class="ev-card '+e.tp+'" data-tp="'+e.tp+'"><div class="ev-data"><div class="ev-dia">'+e.d+'</div><div class="ev-mes">'+MA[e.m]+'</div></div><div class="ev-info"><div class="ev-nome">'+e.ev+'</div><div class="ev-hr">🕐 '+e.hr+'</div><span class="badge '+e.tp+'">'+TL[e.tp]+'</span></div><div class="cal-col"><a class="cal-btn cal-g" href="'+gl+'" target="_blank" rel="noopener">Google</a><button class="cal-btn cal-a" data-ev="'+es+'" data-m="'+e.m+'" data-d="'+e.d+'" data-hi="'+e.hi+'" data-hf="'+e.hf+'">Apple</button></div></div>';}
    h+='</div>';
  }
  res.innerHTML=h;
  document.getElementById("btnVoltar").onclick=function(){res.style.display="none";tel.style.display="flex";};
  document.getElementById("btnG").onclick=function(){window.open(glink(meusCurrent[0].ev,meusCurrent[0].m,meusCurrent[0].d,meusCurrent[0].hi,meusCurrent[0].hf),"_blank");};
  document.getElementById("btnA").onclick=function(){var vs="";for(var i=0;i<meusCurrent.length;i++) vs+=vevent(meusCurrent[i].ev,meusCurrent[i].m,meusCurrent[i].d,meusCurrent[i].hi,meusCurrent[i].hf)+"\r\n";baixarICS("BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//IPManancial//PT\r\n"+vs+"END:VCALENDAR","escala_"+nome.replace(/\s+/g,"_")+"_2026.ics");};
  var abts=res.querySelectorAll(".cal-a");
  for(var i=0;i<abts.length;i++){abts[i].onclick=(function(btn){return function(){var txt="BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//IPManancial//PT\r\n"+vevent(btn.getAttribute("data-ev"),parseInt(btn.getAttribute("data-m")),parseInt(btn.getAttribute("data-d")),btn.getAttribute("data-hi"),btn.getAttribute("data-hf"))+"\r\nEND:VCALENDAR";baixarICS(txt,"plantao_"+p2(btn.getAttribute("data-d"))+"_"+p2(btn.getAttribute("data-m"))+".ics");};})(abts[i]);}
}

(function(){
  var g=document.getElementById("nomes");
  for(var i=0;i<PESSOAS.length;i++){
    var btn=document.createElement("button");
    btn.type="button"; btn.className="name-btn";
    btn.textContent=PESSOAS[i];
    btn.onclick=(function(n){return function(){mostrar(n);};})(PESSOAS[i]);
    g.appendChild(btn);
  }
})();
